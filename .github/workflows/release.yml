name: Release
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (format: v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set version (tag push)
        if: github.event_name == 'push'
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          "RELEASE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Set version (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.version }}"
          if ($version -notmatch '^v\d+\.\d+\.\d+$') {
            Write-Error "Invalid version format: $version. Expected format is v0.1.0"
            exit 1
          }
          "RELEASE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Setup dependencies
        shell: cmd
        run: |
          echo.|setup_win.bat
          call .venv\Scripts\activate.bat
          pip install pyinstaller

      - name: Download Silero VAD model
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "vad" | Out-Null
          Invoke-WebRequest `
            -Uri "https://raw.githubusercontent.com/snakers4/silero-vad/refs/heads/master/src/silero_vad/data/silero_vad.onnx" `
            -OutFile "vad/silero_vad.onnx"

      - name: Build app with build.bat
        shell: cmd
        run: |
          echo.|build.bat

      - name: Create release archive
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "ReleasePackage" | Out-Null
          Copy-Item -Path "dist/HarukaTrans.exe" -Destination "ReleasePackage/HarukaTrans.exe" -Force
          Copy-Item -Path "dist/updater.exe" -Destination "ReleasePackage/updater.exe" -Recurse -Force
          $archiveName = "HarukaTrans-${{ env.RELEASE_VERSION }}.zip"
          "ARCHIVE_NAME=$archiveName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Compress-Archive -Path "ReleasePackage/*" -DestinationPath $archiveName -Force

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_VERSION }}
          name: HarukaTrans ${{ env.RELEASE_VERSION }}
          files: ${{ env.ARCHIVE_NAME }}
